{% extends 'base.html' %}

{% block title %}Add Reminder — InnerLight{% endblock %}

{% block content %}
<div class="form-container">
    <h1>➕ Add Reminder</h1>

    <form method="POST">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <span class="error">{{ field.errors }}</span>
            {% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="btn-primary">Save Reminder</button>
        <a href="{% url 'notification_settings' %}" class="btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
