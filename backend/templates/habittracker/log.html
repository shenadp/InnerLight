{% extends 'base.html' %}

{% block title %}Log Habit — InnerLight{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
        <div class="mb-4">
            <div style="width:52px; height:52px; border-radius:14px; background:var(--il-bg-secondary); border:1px solid var(--il-border); display:flex; align-items:center; justify-content:center; margin-bottom:0.75rem;">
                <i class="bi bi-check2-circle" style="font-size:1.5rem; color:var(--il-primary);"></i>
            </div>
            <h1 style="font-size:1.5rem; font-weight:700;">{{ habit.name }}</h1>
            <p style="color:var(--il-text-muted); font-size:0.9rem;">Log your progress for today.</p>
        </div>
        <div class="il-card">
            <form method="POST">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                    <div style="font-size:0.8rem; color:var(--il-danger); margin-top:4px;">{{ field.errors }}</div>
                    {% endif %}
                </div>
                {% endfor %}
                <div class="d-flex gap-3 mt-4">
                    <button type="submit" class="btn-il-primary" style="padding:10px 28px;">
                        <i class="bi bi-check2"></i> Save Log
                    </button>
                    <a href="{% url 'habit_list' %}" class="btn-il-secondary" style="padding:10px 28px; text-decoration:none;">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
