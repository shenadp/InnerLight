{% extends 'base.html' %}

{% block title %}Edit Habit — InnerLight{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
        <div class="mb-4">
            <h1 style="font-size:1.5rem; font-weight:700;">
                <i class="bi bi-pencil" style="color:var(--il-primary);"></i> Edit Habit
            </h1>
            <p style="color:var(--il-text-muted); font-size:0.9rem;">Update your habit details.</p>
        </div>
        <div class="il-card">
            <form method="POST">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                    <div style="font-size:0.8rem; color:var(--il-danger); margin-top:4px;">{{ field.errors }}</div>
                    {% endif %}
                </div>
                {% endfor %}
                <div class="d-flex gap-3 mt-4">
                    <button type="submit" class="btn-il-primary" style="padding:10px 28px;">
                        <i class="bi bi-check2"></i> Update
                    </button>
                    <a href="{% url 'habit_list' %}" class="btn-il-secondary" style="padding:10px 28px; text-decoration:none;">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
