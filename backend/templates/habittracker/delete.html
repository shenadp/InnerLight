{% extends 'base.html' %}

{% block title %}Delete Habit — InnerLight{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-6">
        <div class="il-card text-center" style="padding: 2.5rem;">
            <div style="font-size: 3rem; margin-bottom: 1rem;">🗑️</div>
            <h1 style="font-size: 1.3rem; font-weight: 600; margin-bottom: 0.5rem;">Delete Habit</h1>
            <p style="color: var(--il-text-muted); font-size: 0.9rem; margin-bottom: 2rem;">Are you sure you want to delete <strong>{{ habit.name }}</strong>? This cannot be undone.</p>
            <form method="POST">
                {% csrf_token %}
                <div class="d-flex gap-3 justify-content-center">
                    <button type="submit" class="btn-il-danger" style="padding: 10px 28px;">Yes, Delete</button>
                    <a href="{% url 'habit_list' %}" class="btn-il-secondary" style="padding: 10px 28px; text-decoration: none;">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
