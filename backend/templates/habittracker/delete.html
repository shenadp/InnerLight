{% extends 'base.html' %}

{% block title %}Delete Habit — InnerLight{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-6">
        <div class="il-card text-center" style="padding:2.5rem;">
            <div style="width:64px; height:64px; border-radius:50%; background:#FFF0EE; display:flex; align-items:center; justify-content:center; margin:0 auto 1.25rem;">
                <i class="bi bi-trash3" style="font-size:1.6rem; color:var(--il-danger);"></i>
            </div>
            <h1 style="font-size:1.3rem; font-weight:700; margin-bottom:0.5rem;">Delete Habit</h1>
            <p style="color:var(--il-text-muted); font-size:0.9rem; margin-bottom:2rem;">
                Are you sure you want to delete <strong>{{ habit.name }}</strong>? This cannot be undone.
            </p>
            <form method="POST">
                {% csrf_token %}
                <div class="d-flex gap-3 justify-content-center">
                    <button type="submit" class="btn-il-danger" style="padding:10px 28px;">
                        <i class="bi bi-trash3"></i> Yes, Delete
                    </button>
                    <a href="{% url 'habit_list' %}" class="btn-il-secondary" style="padding:10px 28px; text-decoration:none;">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
