{% extends 'base.html' %}

{% block title %}Delete Entry — InnerLight{% endblock %}

{% block content %}
<div class="form-container">
    <h1>🗑️ Delete Entry</h1>
    <p>Are you sure you want to delete <strong>{{ entry.title|default:"this entry" }}</strong>?</p>
    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn-danger">Yes, Delete</button>
        <a href="{% url 'journal_detail' entry.pk %}" class="btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
