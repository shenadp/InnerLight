{% extends 'base.html' %}

{% block title %}Edit Entry — InnerLight{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-9 col-lg-7">
        <div class="mb-4">
            <h1 style="font-size: 1.5rem; font-weight: 600;">Edit Entry</h1>
            <p style="color: var(--il-text-muted); font-size: 0.9rem; font-weight: 300;">Update your journal entry.</p>
        </div>
        <div class="il-card">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                    <div style="font-size: 0.8rem; color: var(--il-danger); margin-top: 4px;">{{ field.errors }}</div>
                    {% endif %}
                </div>
                {% endfor %}
                <div class="d-flex gap-3 mt-4">
                    <button type="submit" class="btn-il-primary" style="padding: 10px 28px;">Update</button>
                    <a href="{% url 'journal_detail' entry.pk %}" class="btn-il-secondary" style="padding: 10px 28px; text-decoration: none;">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
