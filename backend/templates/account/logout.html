{% extends 'base.html' %}
{% load static %}

{% block title %}Sign Out — InnerLight{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 70vh;">
    <div style="width: 100%; max-width: 400px;">

        <div class="text-center mb-4">
            <img src="{% static 'img/innerlight/il_logo.png' %}" alt="InnerLight" style="height:56px; width:auto; margin:0 auto 1rem; display:block;">
            <h1 style="font-size:1.6rem; font-weight:700; color:var(--il-text); letter-spacing:-0.5px;">See you soon!</h1>
            <p style="color: var(--il-text-muted); font-size: 0.9rem;">Take care of yourself. <i class="bi bi-heart-fill" style="color:var(--il-primary);"></i></p>
        </div>

        <div class="il-card text-center" style="padding:2rem;">
            <div style="width:64px; height:64px; border-radius:50%; background:var(--il-bg-secondary); display:flex; align-items:center; justify-content:center; margin:0 auto 1.25rem;">
                <i class="bi bi-box-arrow-right" style="font-size:1.8rem; color:var(--il-primary);"></i>
            </div>
            <p style="font-weight:600; font-size:1rem; margin-bottom:0.5rem; color:var(--il-text);">Sign out of InnerLight?</p>
            <p style="color:var(--il-text-muted); font-size:0.875rem; margin-bottom:1.5rem;">Your progress is saved and waiting for you.</p>
            <form method="POST" action="{% url 'account_logout' %}">
                {% csrf_token %}
                <div class="d-flex gap-3 justify-content-center">
                    <button type="submit" class="btn-il-primary" style="padding:10px 28px;">
                        <i class="bi bi-box-arrow-right"></i> Sign Out
                    </button>
                    <a href="{% url 'dashboard' %}" class="btn-il-secondary" style="padding:10px 28px; text-decoration:none;">
                        Cancel
                    </a>
                </div>
            </form>
        </div>

    </div>
</div>
{% endblock %}
